manifest:
  version: "0.13"

  defaults:
    remote: zephyrproject

  remotes:
    - name: zephyrproject
      url-base: https://github.com/zephyrproject-rtos

  projects:
    - name: zephyr
      remote: zephyrproject
      revision: v3.7.0
      import:
        # Pull in Zephyr's own west.yml (hal_espressif, mbedtls, lvgl, etc.)
        name-allowlist:
          - cmsis
          - hal_espressif
          - lvgl
          - mbedtls
          - tinycrypt

  self:
    path: grovenfc
    west-commands: scripts/west-commands.yml
