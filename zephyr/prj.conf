# ── Kernel ──────────────────────────────────────────────────────────────────
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=65536
CONFIG_CBPRINTF_FP_SUPPORT=y

# ── Logging ─────────────────────────────────────────────────────────────────
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BUFFER_SIZE=2048

# ── I2C ─────────────────────────────────────────────────────────────────────
CONFIG_I2C=y

# ── GPIO / Input ─────────────────────────────────────────────────────────────
CONFIG_GPIO=y
CONFIG_INPUT=y
CONFIG_INPUT_GPIO_KEYS=y

# ── SPI (display) ───────────────────────────────────────────────────────────
CONFIG_SPI=y

# ── Display & LVGL ──────────────────────────────────────────────────────────
CONFIG_DISPLAY=y
CONFIG_ST7789V=y

CONFIG_LVGL=y
CONFIG_LV_MEM_SIZE_KILOBYTES=48
CONFIG_LV_USE_LOG=n
CONFIG_LV_USE_LABEL=y
CONFIG_LV_USE_BTN=y
CONFIG_LV_USE_LIST=y
CONFIG_LV_USE_ARC=y
CONFIG_LV_USE_SPINNER=y
CONFIG_LV_USE_BAR=y
CONFIG_LV_USE_MSGBOX=y
CONFIG_LV_USE_TABVIEW=y
CONFIG_LV_FONT_MONTSERRAT_12=y
CONFIG_LV_FONT_MONTSERRAT_14=y
CONFIG_LV_FONT_UNSCII_8=y
CONFIG_LV_COLOR_16_SWAP=y

# ── PWM (backlight + speaker tone) ──────────────────────────────────────────
CONFIG_PWM=y

# ── Flash / NVS (replaces Arduino Preferences) ──────────────────────────────
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

# ── USB CDC (debug console) ──────────────────────────────────────────────────
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_UART_LINE_CTRL=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# ── WiFi (ESP32 native) ──────────────────────────────────────────────────────
CONFIG_WIFI=y
CONFIG_ESP32_WIFI=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_POSIX_NAMES=y
CONFIG_DNS_RESOLVER=y
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y

# ── Thread CPU pinning (dual-core: NFC→core0, UI→core1) ─────────────────────
CONFIG_SCHED_CPU_MASK=y

# ── Application ─────────────────────────────────────────────────────────────
CONFIG_GROVENFC_DRIVER=y
CONFIG_GROVENFC_APP=y
