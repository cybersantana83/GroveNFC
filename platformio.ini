; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:m5stack-atoms3]
platform = espressif32@6.13.0
board = m5stack-atoms3
framework = arduino
monitor_speed = 115200
build_flags =
  -DAPP_TARGET_ATOMS3
lib_deps =
  m5stack/M5Unified @ ^0.2.5
  M5UnitNFC=https://github.com/m5stack/M5Unit-NFC#0.1.0

[env:m5stack-sticks3]
platform = espressif32@6.12.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.arduino.partitions = default_8MB.csv
board_build.arduino.memory_type = qio_opi
build_flags =
  -DESP32S3
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1
  -DAPP_TARGET_STICKS3
lib_deps =
  ; [FORK] Pinned exact, not caret (^0.2.5), to match the version already
  ; deliberately pinned for m5paper below. Caret ranges let CI/local builds
  ; silently pick up new M5Unified releases, which can change PMIC/board
  ; auto-detection behavior (setExtOutput) without any change to this repo.
  m5stack/M5Unified @ 0.2.18
  M5UnitNFC=https://github.com/m5stack/M5Unit-NFC#0.1.0

[env:m5stack-stickcplus]
platform = espressif32@6.7.0
board = m5stick-c
framework = arduino
upload_speed = 1500000
monitor_speed = 115200
build_flags =
  -DAPP_TARGET_STICKCPLUS
lib_deps =
  m5stack/M5Unified @ ^0.2.5
  M5UnitNFC=https://github.com/m5stack/M5Unit-NFC#0.1.0

[env:m5stack-cardputer]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino
upload_speed = 1500000
monitor_speed = 115200
build_flags =
  -DESP32S3
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1
  -DAPP_TARGET_CARDPUTER
lib_deps =
  m5stack/M5Unified @ ^0.2.5
  M5UnitNFC=https://github.com/m5stack/M5Unit-NFC#0.1.0
  M5Cardputer=https://github.com/m5stack/M5Cardputer

[env:m5stack-m5paper]
platform = espressif32@6.7.0
board = esp32dev
framework = arduino
upload_speed = 115200
monitor_speed = 115200
board_build.f_cpu = 240000000L
board_upload.flash_size = 16MB
board_build.partitions = huge_app.csv
build_flags =
  -DAPP_TARGET_M5PAPER
  -DBOARD_HAS_PSRAM
  -DARDUINO_M5STACK_PAPER
  -DCORE_DEBUG_LEVEL=0
extra_scripts = pre:patch_m5unit_nfc.py
lib_deps =
  m5stack/M5Unified @ 0.2.17
  ; [FORK] NOT pinning M5UnitNFC here on purpose: patch_m5unit_nfc.py matches
  ; literal source strings against whatever HEAD looks like today. Pin this
  ; only after confirming the patch still applies cleanly (watch for the
  ; "[M5UnitNFC] patch pattern not found" warning at build time).
  M5UnitNFC=https://github.com/m5stack/M5Unit-NFC
build_src_filter = +<*> -<test_m5paper.cpp>

[env:m5stack-m5paper-test]
platform = espressif32@6.7.0
board = esp32dev
framework = arduino
upload_speed = 115200
monitor_speed = 115200
board_build.f_cpu = 240000000L
board_upload.flash_size = 16MB
board_build.partitions = huge_app.csv
build_flags =
  -DAPP_TARGET_M5PAPER_TEST
  -DARDUINO_M5STACK_PAPER
  -DBOARD_HAS_PSRAM
lib_deps =
  m5stack/M5Unified @ ^0.2.5
build_src_filter = +<test_m5paper.cpp> -<main.cpp> -<GroveNFC.cpp>
